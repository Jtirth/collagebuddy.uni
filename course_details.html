<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Course Details - Study Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Light Mode Variables */
            --bg-body: #FAFAFA;
            --bg-card: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --accent: #2563EB;
            --accent-light: #EFF6FF;
            --success: #10B981;
            --border: #E2E8F0;

            /* Sidebar Variables */
            --sidebar-width-collapsed: 80px;
            --sidebar-width-expanded: 260px;
        }

        body.dark-mode {
            /* Dark Mode Variables */
            --bg-body: #0F172A;
            --bg-card: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --accent-light: #334155;
            --border: #334155;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Reusing Sidebar CSS (Should be in styles.css but inline for now as per project state) */
        .sidebar {
            width: var(--sidebar-width-collapsed);
            height: 100vh;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            z-index: 1000;
            overflow: hidden;
            white-space: nowrap;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar:hover {
            width: var(--sidebar-width-expanded);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1);
            padding: 24px;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 40px;
            text-decoration: none;
            height: 40px;
        }

        .brand i {
            font-size: 1.5rem;
            min-width: 24px;
            text-align: center;
        }

        .brand span {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .sidebar:hover .brand span {
            opacity: 1;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
            justify-content: flex-start;
            height: 48px;
        }

        .nav-item:hover,
        .nav-item.active {
            background-color: var(--accent-light);
            color: var(--accent);
        }

        .nav-item i {
            font-size: 1.25rem;
            min-width: 24px;
            text-align: center;
            display: flex;
            justify-content: center;
        }

        .nav-item span {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .sidebar:hover .nav-item span {
            opacity: 1;
        }

        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            margin-top: auto;
        }

        /* Content Area */
        .content {
            margin-left: var(--sidebar-width-collapsed);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1;
        }

        /* Course Details Specifics */
        .course-header {
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 24px;
        }

        .course-icon-large {
            font-size: 4rem;
            color: var(--accent);
            background: var(--accent-light);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: inline-block;
        }

        h1 {
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 32px;
            margin-bottom: 16px;
        }

        .syllabus-list {
            list-style: none;
            padding: 0;
        }

        .syllabus-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-primary);
        }

        .syllabus-item i {
            color: var(--success);
        }

        .mentor-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .mentor-avatar {
            width: 60px;
            height: 60px;
            background: var(--accent-light);
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .btn-enroll {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 24px;
        }

        .btn-enroll:hover {
            background: #1d4ed8;
        }
    </style>
    <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/mobile-responsive.css">
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <a href="index.html" class="brand">
            <i class="fas fa-graduation-cap"></i>
            <span>Study Buddy</span>
        </a>
        <nav class="nav-menu">
            <a href="index.html" class="nav-item"> <i class="fas fa-home"></i> <span>Dashboard</span> </a>
            <a href="courses.html" class="nav-item active"> <i class="fas fa-book"></i> <span>Courses</span> </a>
            <a href="collab.html" class="nav-item"> <i class="fas fa-users"></i> <span>Collaboration</span> </a>
            <a href="calendar.html" class="nav-item"> <i class="fas fa-calendar"></i> <span>Calendar</span> </a>
            <a href="todo.html" class="nav-item"> <i class="fas fa-check-square"></i> <span>Task Board</span> </a>
        <a href="interview.html" class="nav-item"> <i class="fas fa-user-tie"></i> <span>Interview</span> </a>
        <a href="resources.html" class="nav-item"> <i class="fas fa-folder-open"></i> <span>Resources</span> </a>
        </nav>
        <div class="sidebar-footer">
            <nav class="nav-menu">
                <a href="#" class="nav-item" onclick="toggleTheme()"> <i class="fas fa-moon" id="theme-icon"></i>
                    <span>Light/Dark</span> </a>
                <a href="about.html" class="nav-item"> <i class="fas fa-info-circle"></i> <span>About Us</span> </a>
                <a href="#" class="nav-item" id="account-link"> <i class="fas fa-user-circle"></i> <span>Account</span>
                </a>
            </nav>
        </div>
    </aside>

    <div class="content">
        <div id="course-content">
            <!-- Content will be loaded dynamically -->
            <div class="text-center mt-5">Loading course data...</div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Custom Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/courses-data.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Logic to load course data
        const params = new URLSearchParams(window.location.search);
        const courseId = params.get('id');
        const contentDiv = document.getElementById('course-content');

        if (courseId && coursesData[courseId]) {
            const course = coursesData[courseId];

            // Build Syllabus List
            let syllabusHTML = course.syllabus.map(topic =>
                `<li class="syllabus-item"><i class="fas fa-check-circle"></i> ${topic}</li>`
            ).join('');

            contentDiv.innerHTML = `
                <div class="course-header">
                    <div class="course-icon-large"><i class="${course.icon}"></i></div>
                    <h1>${course.title}</h1>
                    <p class="subtitle">${course.description}</p>
                    <div class="d-flex gap-3 mt-3">
                        <span class="badge bg-primary">${course.category}</span>
                        <span class="badge bg-secondary"><i class="far fa-clock"></i> ${course.duration}</span>
                    </div>
                    <button class="btn-enroll" onclick="handleEnroll('${courseId}')">Enroll Now</button>
                </div>

                <div class="section-title">What you'll learn</div>
                <ul class="syllabus-list">
                    ${syllabusHTML}
                </ul>

                <div class="section-title">Your Mentor</div>
                <div class="mentor-card">
                    <div class="mentor-avatar"><i class="fas fa-chalkboard-teacher"></i></div>
                    <div>
                        <h4 style="margin:0; color:var(--text-primary);">${course.mentor}</h4>
                        <p style="margin:0; color:var(--text-secondary); font-size:0.9rem;">${course.mentorBio}</p>
                    </div>
                </div>
            `;
        } else {
            contentDiv.innerHTML = `<div class="alert alert-warning">Course not found. <a href="courses.html">Go back</a></div>`;
        }

        function handleEnroll(id) {
            const user = firebase.auth().currentUser;
            if (user) {
                alert(`Successfully enrolled in ${coursesData[id].title}!`);
                // Future: Save to Firestore
            } else {
                alert("Please sign in to enroll.");
                signInWithGoogle(); // From auth.js
            }
        }

        // Theme Toggle Logic (Copied for consistency, should be centralized)
        const themeIcon = document.getElementById('theme-icon');
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }
        function updateThemeIcon(isDark) {
            if (isDark) { themeIcon.classList.remove('fa-moon'); themeIcon.classList.add('fa-sun'); }
            else { themeIcon.classList.remove('fa-sun'); themeIcon.classList.add('fa-moon'); }
        }
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                if (themeIcon) updateThemeIcon(true);
            }
        });
    </script>
</body>

</html>
